apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
      - name: notification
        image: hanzla119/ecommerce-notification:v1 
        ports:
        - containerPort: 4000

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  type: ClusterIP 
  selector:
    app: notification
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4000
