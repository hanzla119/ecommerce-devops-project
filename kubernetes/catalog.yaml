apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
      - name: catalog
        # CRITICAL: Replace "hanzla119" if your Docker Hub username is different
        image: hanzla119/ecommerce-catalog:v1 
        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
spec:
  # Notice we are using ClusterIP instead of LoadBalancer here. 
  # This keeps the API internal and secure, so only our frontend can talk to it!
  type: ClusterIP 
  selector:
    app: catalog
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
