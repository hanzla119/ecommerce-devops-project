apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
      - name: cart
        image: hanzla119/ecommerce-cart:v1 
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
spec:
  type: ClusterIP 
  selector:
    app: cart
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
