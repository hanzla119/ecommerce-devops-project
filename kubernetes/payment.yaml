apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment
        image: hanzla119/ecommerce-payment:v1 
        ports:
        - containerPort: 4567

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  type: ClusterIP 
  selector:
    app: payment
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4567
